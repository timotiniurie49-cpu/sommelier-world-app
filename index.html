  // ================================================================
  // NOTIZIA QUOTIDIANA - FETCH E DISPLAY
  // ================================================================

  let cachedNews = null;
  let newsLoadAttempted = false;

  async function fetchDailyNews() {
    if (newsLoadAttempted && cachedNews) return cachedNews;
    newsLoadAttempted = true;

    try {
      const response = await fetch('/api/daily-wine-news', {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
      });

      if (!response.ok) {
        console.error('News API error:', response.status);
        return null;
      }

      const data = await response.json();
      if (data.success && data.news) {
        cachedNews = data.news;
        return data.news;
      }

      return null;
    } catch (error) {
      console.error('Failed to fetch daily news:', error);
      return null;
    }
  }

  function createNewsCard(news, lang) {
    const t = TRANSLATIONS_NEWS[lang] || TRANSLATIONS_NEWS.ita;
    
    if (!news || news.error) {
      return `
        <div class="sapere-card news-card" style="background: linear-gradient(135deg, #2c1810 0%, #1a0f0a 100%); border: 1px solid rgba(184, 134, 11, 0.3);">
          <div class="sapere-icon" style="color: #b8860b;">📰</div>
          <h3 style="color: #d4af37; font-size: 1.1rem; margin-bottom: 0.5rem;">${t.dailyNews}</h3>
          <p style="color: #a0826d; font-size: 0.9rem; line-height: 1.5;">${t.error}</p>
        </div>
      `;
    }

    const title = news.title || t.error;
    const excerpt = news.excerpt || '';
    const sourceUrl = news.sourceUrl || '#';
    const sourceName = news.sourceName || t.source;

    return `
      <div class="sapere-card news-card daily-news-card" style="
        background: linear-gradient(135deg, #2c1810 0%, #1a0f0a 100%);
        border: 1px solid rgba(184, 134, 11, 0.4);
        padding: 1.5rem;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      " onclick="window.open('${sourceUrl}', '_blank')">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 50%); pointer-events: none;"></div>
        
        <div style="position: relative; z-index: 1;">
          <div class="sapere-icon" style="color: #d4af37; font-size: 2rem; margin-bottom: 0.8rem;">📰</div>
          
          <div style="font-size: 0.75rem; color: #b8860b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; font-weight: 600;">
            ${t.todayNews}
          </div>
          
          <h3 style="
            color: #d4af37;
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            font-weight: 700;
            line-height: 1.4;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
          ">${title}</h3>
          
          <p style="
            color: #c9b087;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1rem;
          ">${excerpt}</p>
          
          <div style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid rgba(184, 134, 11, 0.2);
          ">
            <span style="
              color: #8b7355;
              font-size: 0.85rem;
              font-style: italic;
            ">${t.source}: <strong style="color: #b8860b;">${sourceName}</strong></span>
            
            <span style="
              color: #d4af37;
              font-size: 0.85rem;
              font-weight: 600;
              display: flex;
              align-items: center;
              gap: 0.3rem;
            ">${t.readMore} →</span>
          </div>
        </div>
      </div>
    `;
  }

  async function replaceSapereCardWithNews() {
    const currentLang = window.currentLanguage || 'ita';
    const sapereContainer = document.querySelector('.sapere-grid');
    
    if (!sapereContainer) {
      console.warn('Sapere grid not found');
      return;
    }

    // Trova e rimuovi card ALTO se esiste
    const cards = sapereContainer.querySelectorAll('.sapere-card');
    let altoCardIndex = -1;
    
    cards.forEach((card, index) => {
      const text = card.textContent || '';
      if (text.includes('ALTO') || text.includes('alto') || text.includes('Alto')) {
        altoCardIndex = index;
      }
    });

    // Fetch notizia
    const news = await fetchDailyNews();
    const newsCardHTML = createNewsCard(news, currentLang);

    if (altoCardIndex >= 0 && cards[altoCardIndex]) {
      // Sostituisci card ALTO
      cards[altoCardIndex].outerHTML = newsCardHTML;
    } else {
      // Aggiungi come prima card
      sapereContainer.insertAdjacentHTML('afterbegin', newsCardHTML);
    }
  }

  async function loadCurrentNewsInAdmin() {
    const preview = document.getElementById('current-news-preview');
    if (!preview) return;

    const news = await fetchDailyNews();
    const currentLang = window.currentLanguage || 'ita';
    const t = TRANSLATIONS_NEWS[currentLang];

    if (!news || news.error) {
      preview.innerHTML = `<p style="color: #a0826d;">${t.error}</p>`;
      return;
    }

    const isManual = localStorage.getItem('sw_manual_news') !== null;
    const badge = isManual 
      ? `<span style="background: #d4af37; color: #1a0f0a; padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700;">${t.manualOverride}</span>`
      : `<span style="background: rgba(184, 134, 11, 0.3); color: #b8860b; padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600;">${t.aiGenerated}</span>`;

    preview.innerHTML = `
      <div style="margin-bottom: 0.8rem;">${badge}</div>
      <h4 style="color: #d4af37; font-size: 1.1rem; margin-bottom: 0.5rem;">${news.title}</h4>
      <p style="color: #c9b087; margin-bottom: 0.5rem;">${news.excerpt}</p>
      <p style="color: #8b7355; font-size: 0.85rem;">
        <strong>${t.source}:</strong> ${news.sourceName || 'N/A'}<br>
        <strong>URL:</strong> <a href="${news.sourceUrl}" target="_blank" style="color: #b8860b;">${news.sourceUrl}</a>
      </p>
    `;
  }

  function setupAdminTabs() {
    const tabs = document.querySelectorAll('.admin-tab');
    const contents = document.querySelectorAll('.admin-tab-content');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.dataset.tab;

        // Update active tab
        tabs.forEach(t => {
          t.style.background = 'rgba(184, 134, 11, 0.2)';
          t.style.color = '#d4af37';
          t.style.border = '1px solid rgba(184, 134, 11, 0.3)';
          t.classList.remove('active');
        });

        tab.style.background = 'linear-gradient(135deg, #d4af37, #b8860b)';
        tab.style.color = '#1a0f0a';
        tab.style.border = 'none';
        tab.classList.add('active');

        // Show target content
        contents.forEach(content => {
          content.style.display = 'none';
        });

        const targetContent = document.getElementById(`admin-tab-${targetTab}`);
        if (targetContent) {
          targetContent.style.display = 'block';
        }
      });
    });
  }

  function setupNewsOverrideForm() {
    const form = document.getElementById('news-override-form');
    const useAIBtn = document.getElementById('use-ai-news-btn');

    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = document.getElementById('news-title-input').value.trim();
        const excerpt = document.getElementById('news-excerpt-input').value.trim();
        const url = document.getElementById('news-url-input').value.trim();
        const source = document.getElementById('news-source-input').value.trim();

        if (!title || !excerpt) {
          alert('Titolo e riassunto sono obbligatori!');
          return;
        }

        const manualNews = {
          title: title,
          excerpt: excerpt,
          sourceUrl: url || '#',
          sourceName: source || 'Manuale',
          publishDate: new Date().toISOString(),
          manual: true
        };

        localStorage.setItem('sw_manual_news', JSON.stringify(manualNews));
        cachedNews = manualNews;
        newsLoadAttempted = true;

        alert('✅ Notizia manuale salvata!');
        
        // Reload preview
        await loadCurrentNewsInAdmin();
        
        // Update frontend
        await replaceSapereCardWithNews();
      });
    }

    if (useAIBtn) {
      useAIBtn.addEventListener('click', () => {
        localStorage.removeItem('sw_manual_news');
        cachedNews = null;
        newsLoadAttempted = false;

        alert('✅ Ripristinata notizia AI!');
        
        loadCurrentNewsInAdmin();
        replaceSapereCardWithNews();
      });
    }
  }

  // ================================================================
  // INIT
  // ================================================================

  function initDailyNews() {
    // Check for manual override
    const manualNews = localStorage.getItem('sw_manual_news');
    if (manualNews) {
      try {
        cachedNews = JSON.parse(manualNews);
        newsLoadAttempted = true;
      } catch (e) {
        console.error('Invalid manual news in localStorage');
      }
    }

    // Replace card on load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(replaceSapereCardWithNews, 500);
      });
    } else {
      setTimeout(replaceSapereCardWithNews, 500);
    }

    // Update on language change
    const originalUpdateLanguage = window.updateLanguage;
    if (typeof originalUpdateLanguage === 'function') {
      window.updateLanguage = function(lang) {
        originalUpdateLanguage.call(this, lang);
        setTimeout(replaceSapereCardWithNews, 300);
      };
    }

    // Admin mode: inject management panel
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === '1') {
      const checkAdminPanel = setInterval(() => {
        const existingPanel = document.getElementById('admin-content-management');
        if (existingPanel) {
          clearInterval(checkAdminPanel);
          return;
        }

        const adminContainer = document.querySelector('.admin-panel') || document.querySelector('main');
        if (adminContainer) {
          clearInterval(checkAdminPanel);
          
          adminContainer.insertAdjacentHTML('beforeend', createAdminContentManagement());
          
          setTimeout(() => {
            setupAdminTabs();
            loadCurrentNewsInAdmin();
            setupNewsOverrideForm();
          }, 100);
        }
      }, 500);

      setTimeout(() => clearInterval(checkAdminPanel), 5000);
    }
  }

  // Start
  initDailyNews();

  console.log('✅ Patch v24: Daily News Frontend + Admin Panel loaded');

})();

</script>
